services:
  - type: web
    name: legacylift
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn legacylift_app_v2:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: APP_URL
        value: https://legacylift.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: legacylift-db
          property: connectionString

databases:
  - name: legacylift-db
    plan: free
